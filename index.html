<!DOCTYPE html>
<html>
    <title>
        Project Delta Interactive Map

    <body>
        <style>
            h1{text-align: center;}
            img {
                display: flex;
                width: 60%;
                height: auto;

        <img id="Map-image" src="Map.png" alt="Project Delta Bosnia Map">
